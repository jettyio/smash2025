title_call_for_papers = "Appel à contributions"
call_for_papers_content = """
  <p>Nous invitons les chercheur·se·s à soumettre des résumés étendus de 4 pages dans les domaines de recherche définis ci-dessous.</p>

  <h4>Sécurité du ML, confidentialité, responsabilité des modèles et alignement :</h4>
  <ul>
    <li>Sécurité et alignement des systèmes de ML</li>
    <li>Traçabilité des systèmes de ML et des logiciels</li>
    <li>Applications des technologies de protection de la vie privée : confidentialité différentielle, apprentissage fédéré, etc.</li>
    <li>Performance du ML et méthodes d’évaluation comparative</li>
    <li>Provenance des systèmes de ML</li>
    <li>Cas d’utilisation de la sécurité pour les systèmes d’IA avancés</li>
  </ul>

  <h4>Soumissions interdisciplinaires en droit et en sciences sociales :</h4>
  <ul>
    <li>Acceptation des technologies du ML par les cliniciens, les patient·e·s et les administrateur·rice·s</li>
    <li>Évaluation et communication des risques liés au ML</li>
    <li>Considérations éthiques lors du déploiement des systèmes de ML</li>
    <li>Réglementation des technologies du ML</li>
  </ul>

  <p>Les contributions à SMASH de nature appliquée sont également les bienvenues, telles que des études de cas sur le déploiement du ML avec des données sensibles.</p>

  <h4>Applications dans le domaine de la santé :</h4>
  <ul>
    <li>Applications de l’IA en santé (administration, médecine de précision, soins aux patient·e·s, diagnostic)</li>
    <li>Utilisation des données de patient·e·s dans la recherche en ML</li>
    <li>Métriques, suivi (monitoring) et évaluation comparative (benchmarking) du ML en santé</li>
  </ul>

  <h4>Méthodes pour la durabilité du ML :</h4>
  <ul>
    <li>Métriques de comptabilisation des émissions du ML</li>
    <li>Études de cas et applications liées à la durabilité du ML</li>
    <li>Informatique durable et conception de systèmes</li>
    <li>Méthodes de comptabilité environnementale appliquées au ML</li>
  </ul>

  <h4>« Durabilité, santé et sécurité… voilà une combinaison surprenante. Quelle est l’idée ? »</h4>
  <p>Vous n’avez pas tort. Mais c’est en quelque sorte le point ! Nous sommes fermement convaincus que la création d’espaces qui traversent les frontières académiques génère des perspectives enrichissantes.</p>
  <p>Cet événement explore la manière dont l’IA dans les domaines de la durabilité et de la santé suit des trajectoires réglementaires et opérationnelles parallèles, et comment ces domaines pourraient bénéficier d’un échange mutuel d’idées, de pratiques de gouvernance et d’outils.</p>

  <h3>Dates clés</h3>
  <ul>
    <li><strong>1 juillet 2026</strong>: Ouverture des soumissions</li>
    <li><strong>31 août 2026</strong>: Date limite de soumission des articles</li>
    <li><strong>25 sept. 2026</strong>: Notification des décisions aux auteurs</li>
    <li><strong>15 oct. 2026</strong>: Date limite pour la version finale des articles</li>
  </ul>
  
  <h3>Comment soumettre</h3>
  <p>Veuillez cliquer sur le lien suivant pour accéder au portail de soumission OpenReview:</p>
  
  <p><a href="https://openreview.net/group?id=smashcon.org/SMASH/2026/Symposium&referrer=%5BHomepage%5D(%2F)#tab-your-consoles">Soumission OpenReview</a>.</p>
  
  <p>Tous les auteurs et auteur.e.s doivent remplir un formulaire pour confirmer que leur profil OpenReview est complet et tout auteur qualifié peut se voir assigner des évaluations.</p>
  
  <h3>Détails de la soumission</h3>
  <p>Les soumissions doivent comprendre un résumé détaillé de une à quatre pages. Nous vous invitons à utiliser un modèle LaTeX ou RTF à colonne unique et recommandons le modèle <a href="https://www.overleaf.com/latex/templates/template-for-iclr-2025-conference-submission/gqzkdyycxtvt">ICLR 2025 (OpenReview)</a>.</p>
  <p>Toutes les soumissions seront évaluées en fonction de leur pertinence, de leur impact, de leur intérêt pour la communauté, de leur qualité technique et de leur clarté. Il n’y aura pas de période de réfutation. Les résumés exceptionnels seront sélectionnés pour des présentations orales, et toutes les soumissions acceptées seront invitées à faire l’objet d’une présentation par affiche.</p>
  <p>Les soumissions sont évaluées en simple aveugle ; les noms des auteur·rice·s doivent donc apparaître sur les PDF soumis.</p>
"""
