title_invite_for_papers = "Appel à contributions"
invite_for_papers_content = """
  <p>Nous invitons les chercheur·se·s à soumettre des résumés étendus de 4 pages dans les domaines de recherche définis ci-dessous.</p>

  <h4>Sécurité du ML, confidentialité, responsabilité des modèles et alignement:</h4>
  <ul>
    <li>Sécurité, et alignement des systèmes de ML</li>
    <li>Traçabilité des systèmes de ML et des logiciels</li>
    <li>Applications des technologies de protection de la vie privée: confidentialité différentielle, apprentissage fédéré, etc.</li>
    <li>Performances du ML et méthodes d'évaluation comparative</li>
    <li>La provenance des systèmes de ML</li>
    <li>Cas d'utilisation de la sécurité pour les systèmes d'IA avancés</li>
  </ul>

  <h4>Soumissions interdisciplinaires en droit et sciences sociales:</h4>
  <ul>
    <li>Acceptation des technologies de la ML par les cliniciens, les patients et les administrateurs</li>
    <li>Évaluations et communications  des risques liés au ML</li>
    <li>Considérations éthiques lors du déploiement des systèmes ML</li>
    <li>Réglementation des technologies de ML</li>
  </ul>

  <p>Les contributions à SMASH de nature appliquée sont également les bienvenues, telles que les études de cas sur le déploiement de ML avec des données sensibles.</p>

  <h4>Applications dans le domaine de la  santé:</h4>
  <ul>
    <li>Applications de l'IA dans la santé (administration, médecine de précision, soins aux patients, diagnostics)</li>
    <li>Utilisation des données de patients dans la recherche en ML</li>
    <li>Métrique, suivi (monitoring) et évaluation comparative (benchmarking) du ML en santé</li>
  </ul>

  <h4>Méthodes pour la durabilité du ML: </h4>
  <ul>
    <li>Métrique de comptabilisation des émissions du ML</li>
    <li>Études de cas et applications de la durabilité en ML</li>
    <li>Informatique durable et conception de systèmes</li>
    <li>Méthodes de comptabilité environnementale pour le ML</li>
  </ul>

  <h5>« Durabilité, Santé et Sécurité... voilà une combinaison surprenante. Quelle est l'idée ? »</h5>
  <p>Vous n'avez pas tort.  Mais c'est en quelque sorte le point! Nous sommes fermement convaincus que la création d’espaces qui traversent les frontières académiques  génère des perspectives enrichissantes.</p>

  <p>Cet événement explore la manière dont l'IA dans les domaines de la durabilité et de la santé suit des trajectoires réglementaires et opérationnelles parallèles, et comment ces domaines pourraient bénéficier d'un échange mutuel d'idées, de gouvernance et d'outils.</p>
